<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Big Data Ecosystem Overview</title>
  <desc id="desc">A simple diagram showing Backend, Kafka, Hadoop, HDFS, MapReduce, Hive, Trino, Kylin, and Spark relationships.</desc>
  <defs>
    <style>
      .box { fill: #fff; stroke: #111; stroke-width: 3; }
      .label { fill: #111; font-family: Helvetica, Arial, sans-serif; font-size: 34px; text-anchor: middle; dominant-baseline: middle; }
      .label-small { fill: #111; font-family: Helvetica, Arial, sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
      .group-title { fill: #111; font-family: Helvetica, Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .arrow { fill: none; stroke: #111; stroke-width: 3; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 4 L 0 8 z" fill="#111"/>
    </marker>
  </defs>

  <rect x="40" y="520" width="240" height="120" rx="24" class="box"/>
  <text x="160" y="580" class="label">Backend</text>

  <rect x="360" y="520" width="240" height="120" rx="24" class="box"/>
  <text x="480" y="580" class="label">Kafka</text>

  <rect x="680" y="260" width="640" height="400" rx="40" class="box"/>
  <text x="720" y="315" class="group-title">Hadoop</text>

  <rect x="760" y="500" width="220" height="90" rx="20" class="box"/>
  <text x="870" y="545" class="label">MapReduce</text>

  <rect x="1010" y="500" width="220" height="90" rx="20" class="box"/>
  <text x="1120" y="545" class="label">HDFS</text>

  <rect x="740" y="100" width="200" height="100" rx="24" class="box"/>
  <text x="840" y="150" class="label">Hive</text>

  <rect x="970" y="30" width="260" height="110" rx="24" class="box"/>
  <text x="1100" y="86" class="label">Trino</text>
  <text x="1100" y="118" class="label-small">PrestoSQL</text>

  <rect x="1160" y="110" width="200" height="100" rx="24" class="box"/>
  <text x="1260" y="160" class="label">Kylin</text>

  <rect x="1160" y="320" width="200" height="100" rx="24" class="box"/>
  <text x="1260" y="370" class="label">Spark</text>

  <line x1="280" y1="580" x2="360" y2="580" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="320" y="555" class="label-small">fire</text>

  <path d="M 600 580 L 710 580" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="655" y="555" class="label-small">write</text>

  <path d="M 840 200 L 930 490" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="875" y="340" class="label-small">read</text>

  <path d="M 1100 140 L 900 140 L 900 490" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="960" y="210" class="label-small">read</text>

  <path d="M 1260 210 L 1260 430 L 1130 490" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="1290" y="330" class="label-small">read</text>

  <path d="M 1260 210 L 1030 490" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="1195" y="355" class="label-small">read</text>

  <path d="M 1260 420 L 1200 490" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="1248" y="455" class="label-small">read</text>
</svg>
